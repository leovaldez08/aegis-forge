services:
  timescaledb:
    image: postgres:16-alpine
    container_name: aegis-timescaledb
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis_secret
      POSTGRES_DB: aegis_node
    volumes:
      - aegis_pgdata:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegis_node"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: aegis-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT
      - "9001:9001"   # WebSocket (for debugging)
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - aegis_mqtt_data:/mosquitto/data
      - aegis_mqtt_log:/mosquitto/log

volumes:
  aegis_pgdata:
  aegis_mqtt_data:
  aegis_mqtt_log:
