# ─────────────────────────────────────────────────────
# Mosquitto MQTT Broker Configuration
# Development mode — anonymous access allowed
# ─────────────────────────────────────────────────────

# Network listeners
listener 1883
protocol mqtt

listener 9001
protocol websockets

# Authentication (dev mode: allow anonymous)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type all
connection_messages true
